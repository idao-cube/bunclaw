name: build-package

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run tests
        run: bun test

  package-all:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build all targets
        run: bun run package:all

      - name: Build npm tarball
        run: |
          mkdir -p dist/npm
          npm pack --pack-destination dist/npm

      - name: Verify Linux binary
        run: |
          chmod +x dist/bunclaw-bun-linux-x64
          ./dist/bunclaw-bun-linux-x64 --help

      - name: Upload binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: bunclaw-binaries
          path: |
            dist/bunclaw-*
            dist/npm/*.tgz
          if-no-files-found: error

  package-msi:
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build Windows binary
        run: |
          $env:BUNCLAW_TARGET = "bun-windows-x64"
          bun run package

      - name: Install WiX Toolset 3
        shell: powershell
        run: choco install wixtoolset --no-progress -y

      - name: Build MSI
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/build-msi.ps1 -Version $version

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: bunclaw-msi
          path: dist/*.msi
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [package-all, package-msi]
    steps:
      - name: Download binaries artifact
        uses: actions/download-artifact@v4
        with:
          name: bunclaw-binaries
          path: dist

      - name: Download msi artifact
        uses: actions/download-artifact@v4
        with:
          name: bunclaw-msi
          path: dist

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
          make_latest: true
